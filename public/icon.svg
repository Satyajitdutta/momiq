<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background deep shadow -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0a1f12"/>
      <stop offset="100%" stop-color="#020806"/>
    </radialGradient>

    <!-- 3D top face gradient (light hits top-left) -->
    <linearGradient id="faceTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff90"/>
      <stop offset="40%" stop-color="#00d46e"/>
      <stop offset="100%" stop-color="#007a3f"/>
    </linearGradient>

    <!-- 3D right side face (darker — shadow side) -->
    <linearGradient id="faceRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#005a2e"/>
      <stop offset="100%" stop-color="#002e17"/>
    </linearGradient>

    <!-- 3D bottom face -->
    <linearGradient id="faceBottom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#004a26"/>
      <stop offset="100%" stop-color="#001a0e"/>
    </linearGradient>

    <!-- M letter top face -->
    <linearGradient id="mTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#b0ffd8"/>
      <stop offset="100%" stop-color="#00d46e"/>
    </linearGradient>

    <!-- M letter side extrusion -->
    <linearGradient id="mSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#003d20"/>
      <stop offset="100%" stop-color="#001a0e"/>
    </linearGradient>

    <!-- Ambient green glow -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d46e" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00d46e" stop-opacity="0"/>
    </radialGradient>

    <!-- Specular highlight on platform -->
    <linearGradient id="specular" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="dropShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18"/>
      <feOffset dx="0" dy="12"/>
      <feFlood flood-color="#00d46e" flood-opacity="0.4"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Outer glow filter -->
    <filter id="outerGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feFlood flood-color="#00d46e" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Letter glow -->
    <filter id="letterGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#00ff88" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip for rounded square -->
    <clipPath id="roundedSquare">
      <rect x="0" y="0" width="512" height="512" rx="110" ry="110"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="110" ry="110" fill="url(#bgGrad)"/>

  <!-- Ambient glow blob behind everything -->
  <ellipse cx="256" cy="290" rx="200" ry="140" fill="url(#glowGrad)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- 3D PLATFORM — isometric hexagonal platform base  -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- Platform bottom/right shadow face -->
  <polygon points="100,310  256,395  412,310  412,348  256,433  100,348"
    fill="url(#faceBottom)" opacity="0.9"/>

  <!-- Platform right face -->
  <polygon points="256,240  412,155  412,310  256,395"
    fill="url(#faceRight)" opacity="0.95"/>

  <!-- Platform left face (slightly lighter than right) -->
  <polygon points="100,155  256,240  256,395  100,310"
    fill="#004528" opacity="0.85"/>

  <!-- Platform top face — bright lit surface -->
  <polygon points="100,155  256,70  412,155  256,240"
    fill="url(#faceTop)" filter="url(#dropShadow)"/>

  <!-- Specular highlight on top face -->
  <polygon points="100,155  256,70  412,155  256,240"
    fill="url(#specular)"/>

  <!-- Edge highlight — top face perimeter -->
  <polygon points="100,155  256,70  412,155  256,240"
    fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- 3D LETTER "M" — extruded, floating above platform  -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- Extrusion depth layers for M (back faces, drawn first) -->
  <!-- Left leg extrusion -->
  <polygon points="148,178  155,174  155,225  148,229" fill="url(#mSide)"/>
  <!-- Right leg extrusion -->
  <polygon points="349,178  356,174  356,225  349,229" fill="url(#mSide)"/>
  <!-- Left-center extrusion -->
  <polygon points="213,178  220,174  220,205  213,209" fill="url(#mSide)"/>
  <!-- Right-center extrusion -->
  <polygon points="285,178  292,174  292,205  285,209" fill="url(#mSide)"/>
  <!-- Bottom connector extrusion -->
  <polygon points="148,225  355,225  355,232  148,232" fill="#002010"/>

  <!-- M top face — the actual letter in bright green-white -->
  <g filter="url(#letterGlow)">
    <path d="
      M148,178
      L148,229
      L169,229
      L169,198
      L196,218
      L210,218
      L237,198
      L237,229
      L266,229
      L266,198
      L292,218
      L306,218
      L334,198
      L334,229
      L356,229
      L356,178
      L334,178
      L307,200
      L280,178
      L232,178
      L205,200
      L178,178
      Z
    " fill="url(#mTop)"/>
  </g>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- "IQ" sub-text on the platform face                 -->
  <!-- ═══════════════════════════════════════════════════ -->

  <g opacity="0.85">
    <!-- I -->
    <rect x="218" y="252" width="12" height="38" rx="3" fill="#00d46e"/>
    <!-- Q circle -->
    <circle cx="265" cy="271" r="18" fill="none" stroke="#00d46e" stroke-width="10"/>
    <line x1="276" y1="282" x2="288" y2="294" stroke="#00d46e" stroke-width="9" stroke-linecap="round"/>
  </g>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Small "by Pithonix AI" strip at bottom             -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="156" y="388" width="200" height="28" rx="14" fill="rgba(0,212,110,0.1)" stroke="rgba(0,212,110,0.25)" stroke-width="1"/>
  <text x="256" y="406" text-anchor="middle" font-family="'Inter',sans-serif" font-size="13" font-weight="500" letter-spacing="2" fill="rgba(0,212,110,0.7)">PITHONIX AI</text>

  <!-- Top shine — simulates glass/lacquer finish -->
  <ellipse cx="200" cy="95" rx="90" ry="30" fill="rgba(255,255,255,0.06)"/>

  <!-- Border ring -->
  <rect x="2" y="2" width="508" height="508" rx="109" ry="109" fill="none" stroke="rgba(0,212,110,0.2)" stroke-width="3"/>
</svg>
